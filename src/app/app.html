<main class="min-h-screen bg-gray-50 dark:bg-gray-900 font-sans antialiased text-gray-900 dark:text-white transition-colors duration-200">
  <!-- Header -->
  <header class="sticky top-0 z-10 shadow-sm backdrop-blur-lg bg-white/80 dark:bg-gray-900/80 border-b border-gray-200 dark:border-gray-700">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-600 p-2 rounded-xl mr-3 shadow-lg shadow-blue-200 dark:shadow-blue-900/50">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
          </svg>
        </div>
        <h1 class="text-xl font-black tracking-tight text-gray-900 dark:text-white">
          Nexa<span class="text-blue-600 dark:text-blue-500">TV</span>
        </h1>
      </div>

      <div class="flex items-center gap-3">
        <div class="hidden sm:flex items-center text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest bg-gray-50 dark:bg-gray-800 px-3 py-1.5 rounded-full border border-gray-100 dark:border-gray-700">
          World Cup 2026
        </div>
        <app-theme-toggle />
      </div>
    </div>
  </header>

  <!-- Content -->
  <div class="pt-8">
    <app-status-filter 
      [activeStatus]="matchService.activeStatus()"
      (statusChange)="onStatusChange($event)"
    />

    <app-match-list />
  </div>

  <!-- Mobile Navigation Placeholder -->
  <nav class="fixed bottom-0 left-0 right-0 z-20 backdrop-blur-lg bg-white/95 dark:bg-gray-900/95 border-t border-gray-200 dark:border-gray-700 px-6 py-3 flex justify-around items-center md:hidden">
    <button class="flex flex-col items-center text-blue-600 dark:text-blue-500">
      <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
      <span class="text-[10px] font-bold uppercase">Inicio</span>
    </button>
    <button class="flex flex-col items-center text-gray-400 dark:text-gray-500">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <span class="text-[10px] font-bold uppercase">Buscar</span>
    </button>
    <button class="flex flex-col items-center text-gray-400 dark:text-gray-500">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <span class="text-[10px] font-bold uppercase">Perfil</span>
    </button>
  </nav>
</main>
