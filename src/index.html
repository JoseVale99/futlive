<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FutLive — World Cup 2026 en vivo</title>
  <meta name="description" content="Sigue el Mundial 2026 en vivo: resultados, goles, estadísticas, alineaciones y más. Todo en tiempo real.">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="FutLive — World Cup 2026 en vivo">
  <meta property="og:description" content="Sigue el Mundial 2026 en vivo: resultados, goles, estadísticas, alineaciones y más. Todo en tiempo real.">
  <meta property="og:image" content="https://nexatv-teal.vercel.app/favicon.svg">
  <meta property="og:url" content="https://nexatv-teal.vercel.app">
  <meta property="og:site_name" content="FutLive">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="FutLive — World Cup 2026 en vivo">
  <meta name="twitter:description" content="Sigue el Mundial 2026 en vivo: resultados, goles, estadísticas, alineaciones y más.">
  <meta name="twitter:image" content="https://nexatv-teal.vercel.app/favicon.svg">

  <!-- Theme color for mobile browsers -->
  <meta name="theme-color" content="#22c55e">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet" />
  <script>
    (function() {
      var t = 'futlive-theme';
      var stored = null;
      try { stored = localStorage.getItem(t); } catch(e) {}
      var valid = stored === 'light' || stored === 'dark' || stored === 'system';
      var pref = valid ? stored : 'system';
      var dark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    })();
  </script>
  <style>
    .app-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f9fafb, #f3f4f6);
      transition: opacity 0.3s ease-out;
    }
    .dark .app-splash {
      background: linear-gradient(135deg, #111827, #0a0e17);
    }
    .app-splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .splash-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #22c55e, #059669, #0d9488);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.3);
      animation: splash-pulse 1.5s ease-in-out infinite;
    }
    .splash-logo svg {
      width: 36px;
      height: 36px;
      color: white;
    }
    .splash-text {
      margin-top: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.5px;
    }
    .dark .splash-text { color: #fff; }
    .splash-text span {
      background: linear-gradient(90deg, #22c55e, #059669);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .splash-bar {
      margin-top: 24px;
      width: 120px;
      height: 3px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
    }
    .dark .splash-bar { background: #374151; }
    .splash-bar::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #0d9488);
      border-radius: 4px;
      animation: splash-progress 1s ease-in-out infinite;
    }
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes splash-progress {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <!-- Initial splash screen (removed by Angular after bootstrap) -->
  <div class="app-splash" id="app-splash">
    <div class="splash-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <polygon points="12,8 14.5,10 13.5,13 10.5,13 9.5,10" fill="white" stroke="none"/>
        <line x1="12" y1="3" x2="12" y2="8"/>
        <line x1="14.5" y1="10" x2="20" y2="8.5"/>
        <line x1="13.5" y1="13" x2="18" y2="17"/>
        <line x1="10.5" y1="13" x2="6" y2="17"/>
        <line x1="9.5" y1="10" x2="4" y2="8.5"/>
      </svg>
    </div>
    <div class="splash-text">Fut<span>Live</span></div>
    <div class="splash-bar"></div>
  </div>
  <app-root></app-root>
  <script>
    // Remove splash after Angular hydrates
    window.addEventListener('load', function() {
      setTimeout(function() {
        var splash = document.getElementById('app-splash');
        if (splash) {
          splash.classList.add('fade-out');
          setTimeout(function() { splash.remove(); }, 300);
        }
      }, 200);
    });
  </script>
</body>
</html>
