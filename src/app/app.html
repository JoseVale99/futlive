<main class="min-h-screen bg-linear-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-950 font-sans antialiased text-gray-900 dark:text-white transition-colors duration-300">
  <!-- Header -->
  <header class="sticky top-0 z-30 backdrop-blur-xl bg-white/90 dark:bg-gray-900/90 border-b border-gray-200 dark:border-gray-800 shadow-lg">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="relative">
          <div class="absolute inset-0 bg-linear-to-r from-blue-600 to-indigo-600 rounded-2xl blur-md opacity-50"></div>
          <div class="relative bg-linear-to-br from-blue-600 to-indigo-600 p-2.5 rounded-2xl shadow-xl shadow-blue-500/20 dark:shadow-blue-900/40">
            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
          </div>
        </div>
        <div>
          <h1 class="text-2xl font-extrabold tracking-tight text-gray-900 dark:text-white">
            Nexa<span class="text-transparent bg-clip-text bg-linear-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400">TV</span>
          </h1>
          <p class="text-xs text-gray-500 dark:text-gray-400 font-medium">World Cup 2026</p>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <div class="hidden md:flex items-center gap-6 text-sm font-semibold">
          <a [routerLink]="['/']" routerLinkActive="text-blue-600 dark:text-blue-500" [routerLinkActiveOptions]="{exact: true}" class="text-gray-500 dark:text-gray-400 hover:text-blue-600 transition-colors">Inicio</a>
          <a [routerLink]="['/posiciones']" routerLinkActive="text-blue-600 dark:text-blue-500" class="text-gray-500 dark:text-gray-400 hover:text-blue-600 transition-colors">Posiciones</a>
          <div class="flex items-center gap-2 text-gray-500 dark:text-gray-400">
            <span class="relative flex h-2 w-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            Live
          </div>
        </div>
        <app-theme-toggle />
      </div>
    </div>
  </header>

  <!-- Content -->
  <div class="pt-10 pb-24 md:pb-10">
    <router-outlet />
  </div>

  <!-- Mobile Navigation -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 z-40 backdrop-blur-xl bg-white/95 dark:bg-gray-900/95 border-t border-gray-200 dark:border-gray-800 px-4 py-3 flex justify-around items-center shadow-xl">
    <a [routerLink]="['/']" routerLinkActive="text-blue-600 dark:text-blue-500" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center min-h-11 min-w-11 justify-center transition-colors">
      <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
      <span class="text-[11px] font-bold uppercase tracking-wide">Inicio</span>
    </a>
    <a [routerLink]="['/posiciones']" routerLinkActive="text-blue-600 dark:text-blue-500" class="flex flex-col items-center min-h-11 min-w-11 justify-center transition-colors text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
      </svg>
      <span class="text-[11px] font-bold uppercase tracking-wide">Posiciones</span>
    </a>
    <button class="flex flex-col items-center text-gray-400 dark:text-gray-500 min-h-11 min-w-11 justify-center hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <span class="text-[11px] font-bold uppercase tracking-wide">Buscar</span>
    </button>
    <button class="flex flex-col items-center text-gray-400 dark:text-gray-500 min-h-11 min-w-11 justify-center hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <span class="text-[11px] font-bold uppercase tracking-wide">Perfil</span>
    </button>
  </nav>
</main>
